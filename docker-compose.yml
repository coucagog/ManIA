services:
  app:
    build: .
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mania.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mania.entrypoints=websecure"
      - "traefik.http.routers.mania.tls=true"
      - "traefik.http.routers.mania.tls.certresolver=letsencrypt"
      - "traefik.http.services.mania.loadbalancer.server.port=3000"
    environment:
      DATABASE_URL: "file:/data/prod.db"
      SESSION_SECRET: "${SESSION_SECRET}"
      NEXTAUTH_URL: "https://${DOMAIN}"
      NODE_ENV: "production"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      NEXT_PUBLIC_BASE_URL: "https://${DOMAIN}"
      CRON_SECRET: "${CRON_SECRET}"
    volumes:
      - db_data:/data
      - uploads:/app/public/uploads

networks:
  web:
    external: true   # réseau créé une fois par Traefik, partagé entre toutes les apps

volumes:
  db_data:
  uploads:
